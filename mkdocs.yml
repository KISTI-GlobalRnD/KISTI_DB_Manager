site_name: KISTI_DB_Manager Docs
site_description: MariaDB/MySQL ingest, flattening, and review manual
site_url: https://kisti-globalrnd.github.io/KISTI_DB_Manager/
repo_url: https://github.com/KISTI-GlobalRnD/KISTI_DB_Manager
repo_name: KISTI-GlobalRnD/KISTI_DB_Manager

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Manual:
      - Manual Overview: manual/index.md
      - Chapter 1. Package Overview: manual/package-overview.md
      - Chapter 2. Getting Started: manual/getting-started.md
      - Chapter 3. JSON Modes: manual/json-modes.md
      - Chapter 4. OpenAlex Example Workflow: manual/openalex-workflow.md
      - Chapter 5. Review and Visualization: manual/review-visualization.md
      - Chapter 6. Restart & Recovery: manual/restart-recovery.md
  - Reference:
      - Reference Overview: reference/index.md
      - CLI Quick Reference: reference/cli.md
      - Examples: reference/examples.md
  - Design Notes:
      - Design Notes Overview: design/index.md
      - 2026-02-09 Ingest Tuning: performance/2026-02-09_ingest_tuning.md
      - 2026-02-27 Schema Display Benchmark: performance/2026-02-27_schema-display-benchmark_from_02-goldset.md
      - 2026-03-31 Parquet Materializer Plan: performance/2026-03-31_parquet_materializer_plan.md
